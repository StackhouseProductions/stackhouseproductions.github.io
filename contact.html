<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us | Stackhouse Productions</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      box-sizing: border-box;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 90px;
      flex-wrap: wrap;
    }

    .brand {
      text-decoration: none;
      color: #fff;
      letter-spacing: 3px;
      font-size: 1rem;
    }

    .nav {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      letter-spacing: 1px;
      font-size: 0.95rem;
    }

    .nav a:hover,
    .nav a.active {
      color: #fff;
    }

    .content {
      max-width: 760px;
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 4.5rem);
      letter-spacing: 5px;
      margin: 0 0 24px;
      text-transform: uppercase;
    }

    p {
      opacity: 0.72;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .email {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 14px 18px;
      letter-spacing: 1px;
      transition: border-color 0.25s ease, background 0.25s ease;
    }

    .email:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="brand" href="index.html">STACKHOUSE PRODUCTIONS</a>
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="short-films.html">Short Films</a>
        <a href="features.html">Features</a>
        <a class="active" href="contact.html">Contact Us</a>
      </div>
    </div>

    <div class="content">
      <h1>Contact Us</h1>
      <p>
        For inquiries, collaborations, and general contact, please reach out by email.
      </p>
      <a class="email" href="mailto:inmotion@stackhouseproductions.com">
        inmotion@stackhouseproductions.com
      </a>
    </div>
  </div>
</body>
</html>
