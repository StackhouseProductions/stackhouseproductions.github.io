<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Features | Stackhouse Productions</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      box-sizing: border-box;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 100px;
      flex-wrap: wrap;
    }

    .brand {
      text-decoration: none;
      color: #fff;
      display: inline-flex;
      align-items: center;
    }

    .brand img {
      height: 100px;
      width: auto;
      display: block;
    }

    .nav {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      letter-spacing: 1px;
      font-size: 0.95rem;
    }

    .nav a:hover,
    .nav a.active {
      color: #fff;
    }

    .center {
      min-height: 55vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 6px;
      margin: 0 0 20px;
      text-transform: uppercase;
    }

    p {
      opacity: 0.65;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="Stackhouse Productions Home">
        <img src="logo.png" alt="Stackhouse Productions logo">
      </a>
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="short-films.html">Short Films</a>
        <a class="active" href="features.html">Features</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </div>

    <div class="center">
      <h1>Coming Soon</h1>
      <p>Feature projects currently in development.</p>
    </div>
  </div>
</body>
</html>
