<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stackhouse Productions</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 20px 20px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 6px;
      margin: 0 0 20px 0;
    }

    .logo-wrap {
      width: min(760px, 92vw);
      margin: 0 0 60px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .subtitle {
      max-width: 700px;
      opacity: 0.68;
      line-height: 1.7;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: min(900px, 100%);
    }

    .nav-card {
      display: flex;
      align-items: end;
      justify-content: start;
      min-height: 220px;
      padding: 24px;
      text-decoration: none;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(to top, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
      box-sizing: border-box;
    }

    .nav-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.35);
      background:
        linear-gradient(to top, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
    }

    .nav-card span {
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.6;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .footer-links {
      margin-top: 10px;
    }

    .footer-links a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }

    .footer-links a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1 class="sr-only">STACKHOUSE PRODUCTIONS</h1>

    <div class="logo-wrap">
      <a href="index.html">
        <img src="logo.png" alt="Stackhouse Productions logo">
      </a>
    </div>

    <div class="subtitle">
      Original genre storytelling currently in development.
      Explore upcoming short films, feature projects, and contact information.
    </div>

    <div class="nav-grid">
      <a class="nav-card" href="short-films.html"><span>Short Films</span></a>
      <a class="nav-card" href="features.html"><span>Features</span></a>
      <a class="nav-card" href="contact.html"><span>Contact Us</span></a>
    </div>
  </div>

  <footer>
    <div>© 2026 Stackhouse Productions</div>

    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="short-films.html">Short Films</a>
      <a href="features.html">Features</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>
</body>
</html>
